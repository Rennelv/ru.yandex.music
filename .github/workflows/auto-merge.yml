name: Auto merge updates

on:
  workflow_run:
    workflows:
      - Build and Deploy Repository
    types:
      - completed

jobs:
  merge:
    name: Merge update PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Merge repository-generated PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests ?? [];
            for (const pr of prs) {
              if (pr.user?.login !== 'github-actions[bot]') continue;
              if (pr.head?.repo?.full_name !== `${context.repo.owner}/${context.repo.repo}`) continue;

              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'merge',
              });
            }
