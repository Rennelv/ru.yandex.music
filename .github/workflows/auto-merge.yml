name: Auto merge updates

on:
  workflow_run:
    workflows:
      - Build and Deploy Repository
    types:
      - completed

jobs:
  merge:
    name: Merge update PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Merge repository-generated PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests ?? [];
            const allowedTitlePrefix = 'yandex-music: Update ';
            const failures = [];

            for (const pr of prs) {
              if (pr.user?.login !== 'github-actions[bot]') continue;
              if (pr.head?.repo?.full_name !== `${context.repo.owner}/${context.repo.repo}`) continue;
              if (!pr.title?.startsWith(allowedTitlePrefix)) continue;

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                core.error(`Failed to merge PR #${pr.number} (${pr.title}): ${message}`);
                failures.push(`PR #${pr.number}: ${message}`);
              }
            }

            if (failures.length > 0) {
              const failedPullNumbers = failures.map((failure) => failure.split(':', 1)[0]).join(', ');
              throw new Error(`Failed to automatically merge ${failures.length} PR(s): ${failedPullNumbers}. Check the workflow logs for details.`);
            }
