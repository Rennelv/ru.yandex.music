name: Auto-merge updates

on:
  workflow_run:
    workflows:
      - Build and Deploy Repository
    types:
      - completed

jobs:
  merge:
    name: Merge update PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      AUTO_MERGE_TITLE_PREFIX: "${{ vars.AUTO_MERGE_TITLE_PREFIX || 'yandex-music: Update ' }}"
      AUTO_MERGE_METHOD: "${{ vars.AUTO_MERGE_METHOD || 'merge' }}"

    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Merge repository-generated PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const allowedMergeMethods = new Set(['merge', 'squash', 'rebase']);
            const mergeMethod = process.env.AUTO_MERGE_METHOD;
            const titlePrefix = process.env.AUTO_MERGE_TITLE_PREFIX;
            const failures = [];

            if (!allowedMergeMethods.has(mergeMethod)) {
              throw new Error(`Invalid merge method "${mergeMethod}". Expected one of: merge, squash, rebase.`);
            }

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.workflow_run.head_sha,
            });

            for (const pr of prs) {
              if (
                pr.user?.login === 'github-actions[bot]' &&
                pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}` &&
                pr.title?.startsWith(titlePrefix)
              ) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: mergeMethod,
                  });
                } catch (error) {
                  const message = error instanceof Error ? error.message : String(error);
                  core.error(`Failed to merge PR #${pr.number} (${pr.title}): ${message}`);
                  failures.push({ number: pr.number, message });
                }
              }
            }

            if (failures.length > 0) {
              const failedPullNumbers = failures.map((failure) => `#${failure.number}`).join(', ');
              throw new Error(`Failed to automatically merge ${failures.length} PR(s): ${failedPullNumbers}. Check the workflow logs for details.`);
            }
