id: ru.yandex.music
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
tags:
  - proprietary

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --filesystem=/tmp
  - --device=dri
  - --talk-name=org.gnome.SettingsDaemon.MediaKeys
  - --talk-name=org.gnome.SessionManager
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --own-name=org.mpris.MediaPlayer2.*

modules:
  - name: yandex-music
    buildsystem: simple
    build-commands:
      - ar x Yandex_Music.deb
      - tar xf data.tar.xz

      - mkdir -p /app/yandexmusic
      - cp -r "./opt/$(ls -AU ./opt | head -1)/." /app/yandexmusic/
      - rm -f /app/yandexmusic/resources/package-type

      - |
        for size in 16 32 48 64 128 256 512; do
          mkdir -p "/app/share/icons/hicolor/${size}x${size}/apps"
          cp "usr/share/icons/hicolor/${size}x${size}/apps/yandexmusic.png" \
             "/app/share/icons/hicolor/${size}x${size}/apps/ru.yandex.music.png" || true
        done

      - install -Dm644 ru.yandex.music.desktop /app/share/applications/ru.yandex.music.desktop
      - install -Dm644 ru.yandex.music.metainfo.xml /app/share/metainfo/ru.yandex.music.metainfo.xml
      - install -Dm755 run.sh /app/bin/run.sh

    sources:
      - type: file
        dest-filename: Yandex_Music.deb
        url: https://music-desktop-application.s3.yandex.net/stable/Yandex_Music_amd64_5.100.1.deb
        sha512: c765f4cd9b2319db31addb8ba2b51a862bdf515d775fb7ab5b88535d8581122ac1fb04afa062981b6f349ec97789f91da9ba7354ec0ea6be0ef08aca7afc468c
        x-checker-data:
          type: electron-updater
          url: https://music-desktop-application.s3.yandex.net/stable/latest-linux.yml

      - type: script
        dest-filename: run.sh
        commands:
          - exec zypak-wrapper /app/yandexmusic/yandexmusic "$@"

      - type: file
        path: ru.yandex.music.desktop

      - type: file
        path: ru.yandex.music.metainfo.xml
